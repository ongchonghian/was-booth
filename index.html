<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAS Booth Infographic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      @media (prefers-reduced-motion: no-preference) {
        .flip-hint {
          transform-style: preserve-3d;
          will-change: transform;
        }
        .group\/card:hover .flip-hint {
          animation: flipHint 900ms ease-in-out infinite alternate;
        }
      }
      @keyframes flipHint {
        from { transform: rotateY(-10deg); }
        to { transform: rotateY(10deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, createContext, useContext } = React;

      const createLucideIcon = (iconData) => {
        return (props) => {
          const [tagName, attrs, children] = iconData;
          return React.createElement(
            tagName,
            {
              ...attrs,
              ...props,
              className: `${attrs.class || ""} ${props.className || ""}`.trim(),
            },
            children.map(([childTagName, childAttrs], idx) =>
              React.createElement(childTagName, { ...childAttrs, key: idx }),
            ),
          );
        };
      };

      const {
        Fish: FishData, Trophy: TrophyData, ClipboardList: ClipboardListData,
        Gauge: GaugeData, WifiOff: WifiOffData, ScanLine: ScanLineData,
        Users: UsersData, Target: TargetData, ArrowRight: ArrowRightData,
        CheckCircle2: CheckCircle2Data, Timer: TimerData,
        MessageSquare: MessageSquareData, CalendarCheck: CalendarCheckData,
        Sparkles: SparklesData,
      } = window.lucide;

      const Fish = createLucideIcon(FishData);
      const Trophy = createLucideIcon(TrophyData);
      const ClipboardList = createLucideIcon(ClipboardListData);
      const Gauge = createLucideIcon(GaugeData);
      const WifiOff = createLucideIcon(WifiOffData);
      const ScanLine = createLucideIcon(ScanLineData);
      const Users = createLucideIcon(UsersData);
      const Target = createLucideIcon(TargetData);
      const ArrowRight = createLucideIcon(ArrowRightData);
      const CheckCircle2 = createLucideIcon(CheckCircle2Data);
      const Timer = createLucideIcon(TimerData);
      const MessageSquare = createLucideIcon(MessageSquareData);
      const CalendarCheck = createLucideIcon(CalendarCheckData);
      const Sparkles = createLucideIcon(SparklesData);

const pillars = [
          {
            icon: ClipboardList,
            title: "Less manual farm admin",
            text: "Show that daily farm records can be faster, cleaner, and easier to capture.",
          },
          {
            icon: Fish,
            title: "Real operational traceability",
            text: "Demonstrate how batches, locations, and farm events can stay linked over time.",
          },
          {
            icon: Gauge,
            title: "Useful farm insights",
            text: "Help visitors see that better records lead to better visibility and decisions.",
          },
          {
            icon: WifiOff,
            title: "Field-ready reliability",
            text: "Make offline-resilient workflows feel concrete rather than theoretical.",
          },
        ];

        const games = [
          {
            name: "Daily Log Quest",
            time: "1–2 min",
            fit: "Best for quick engagement",
            goal: "Gamify daily log completion by turning routine actions into a multi-tier streak ladder.",
            steps: [
              "1. Start State: Worker opens the app. The Home Screen shows a chunky progress bar: \"Today's Streak: 0/3 Logs\".",
              "2. Action: Worker selects \"Feed Fish\" and completes the normal feeding workflow.",
              "3. Trigger: Upon hitting \"Submit\" on the feed log, the app returns to the Home Screen.",
              "4. Reward (Loud): The progress bar fills to \"1/3\". A full-screen overlay instantly appears: A large, bouncy gold star scales up (ease-out), accompanied by the text \"First Log of the Day!\". The overlay fades out after 3 seconds, returning the user to the Home screen.",
              "5. Continuation: If the worker completes 2 more logs of any type, the bar hits 3/3, triggering an even larger \"Streak Master!\" confetti animation.",
            ],
            teaches: ["daily habits", "log completion", "farm routine"],
            whyItWorks:
              "Uses existing metrics to provide instant, loud animated feedback without backend changes.",
            capture: "QR for app trial + streak challenge",
            effort:
              "Low: Reuses existing 'todayLogCount' from HomeViewModel. Just needs the new UI Overlay + Lottie animations.",
          },
          {
            name: "Ops Bingo",
            time: "2–3 min",
            fit: "Best for exploring features",
            goal: "Encourage workers to explore different log types (Feed, Grade, Sample) to fill a Bingo card.",
            steps: [
              "1. Start State: Worker opens the \"Ops Bingo\" bottom sheet from the Home Screen. They see a 2x3 grid of greyed-out tiles (Feed, Grade, Sample, Dead Fish, Harvest, Withdraw).",
              "2. Action: Worker notices \"Dead Fish\" is unlit. They go to the pen, find a mortality, and log it via the \"Dead Fish\" button.",
              "3. Trigger: Upon submitting the mortality log, they return to the Home Screen.",
              "4. Reward (Tactile): The \"Dead Fish\" tile on the Bingo board illuminates with a bright color (e.g., Teal). If that tile completes a row of 3, a \"Line Completed!\" toast pops up.",
              "5. Grand Prize: If the worker lights up all 6 tiles in a single day, the overlay triggers a massive, screen-filling confetti drop (respecting prefers-reduced-motion settings).",
            ],
            teaches: [
              "feature discovery",
              "workflow variety",
              "comprehensive logging",
            ],
            whyItWorks:
              "Drives horizontal adoption using chunky, tactile UI tiles and confetti rewards.",
            capture: "QR for full feature list + demo",
            effort:
              "Medium: Requires a new bottom sheet UI and querying 6 existing local DAOs to determine tile states.",
          },
          {
            name: "Sync Clean Badge",
            time: "1 min",
            fit: "Best trust builder",
            goal: "Gamify offline-first hygiene by rewarding workers when they clear all pending records.",
            steps: [
              "1. Start State: Worker has been logging offline all morning. The Home Screen shows \"Pending Records: 12\" and \"Last Sync: 4 hours ago\".",
              "2. Action: Worker returns to the farm office (with Wi-Fi) and performs a pull-to-refresh gesture on the Home Screen.",
              "3. Trigger: The CacheSyncManager successfully pushes all 12 records to the backend. The pending count drops to 0.",
              "4. Reward (Audio/Visual): A subtle, satisfying \"pop\" sound plays (5-15ms duration). The background dims slightly, and a bright \"Sync Clean!\" badge animates into the center of the screen. The Home Screen updates to read \"Pending Records: 0\" and \"Last Sync: Just now\".",
            ],
            teaches: ["offline logging", "sync habits", "field reliability"],
            whyItWorks:
              "Turns a mundane data sync action into a satisfying, badge-earning moment.",
            capture: "Badge or QR at sync station",
            effort:
              "Low: Hooks directly into existing CacheSyncManager completion callbacks. Minor UI overlay work.",
          },
          {
            name: "Sampling Micro-Quiz",
            time: "1–2 min",
            fit: "Best for deeper conversations",
            goal: "Reinforce biological concepts with a quick 5-second educational popup after a workflow.",
            steps: [
              "1. Start State: Worker is performing a Sampling workflow (weighing and measuring fish).",
              "2. Action: Worker enters the data (e.g., Average Weight = 500g, Feed Type = Grower) and taps \"Submit\" on Step 3 (ReviewSubmitStep).",
              "3. Trigger: Instead of immediately showing the green success checkmark, the app intercepts the flow (happens randomly ~20% of the time).",
              "4. The Quiz: A high-contrast card slides up from the bottom: \"Quiz: Your fish average 500g today. Based on the 'Grower' feed type you selected, is this on track for a 30-day harvest?\" Buttons: [Yes] / [No, needs more time].",
              "5. Reward: If they tap the correct answer, a mini-celebration animation plays right on the card, and then transitions smoothly to the final green success screen. If incorrect, a gentle \"Actually, they need about 45 more days!\" hint appears before proceeding.",
            ],
            teaches: ["SGR/FCR concepts", "data validation", "fish growth"],
            whyItWorks:
              "Contextual learning tied directly to the data just entered, making it highly relevant.",
            capture: "Persona-tagged lead capture",
            effort:
              "Medium: Requires intercepting the existing ReviewSubmitStep with a new conditional sliding card UI.",
          },
        ];

        const parseGameplayStep = (rawStep = "") => {
          const normalized = String(rawStep).replace(/^\s*\d+\.\s*/, "").trim();
          const splitIndex = normalized.indexOf(":");
          if (splitIndex === -1) return { title: "", text: normalized };
          return {
            title: normalized.slice(0, splitIndex).trim(),
            text: normalized.slice(splitIndex + 1).trim(),
          };
        };

        const boothFlow = [
          {
            title: "1. Stop",
            text: "Hook them in 3 seconds. 'Play a farm game in under 3 minutes.'",
          },
          {
            title: "2. Play",
            text: "Run one short activity tied directly to a real farm operation.",
          },
          {
            title: "3. Learn",
            text: "Connect the game to a product takeaway in 30 seconds.",
          },
          {
            title: "4. Convert",
            text: "Capture the lead, tag interest, and book the next step.",
          },
        ];

        const staffing = [
          {
            role: "Greeter",
            text: "Pulls traffic with a hook, not a pitch.",
          },
          {
            role: "Game Coach",
            text: "Runs the activity and keeps the pace high.",
          },
          {
            role: "Closer",
            text: "Connects value, qualifies, and secures follow-up.",
          },
        ];

        const successMetrics = [
          {
            label: "Traffic Stopped",
            detail: "Is the booth message interrupting the aisle?",
          },
          {
            label: "Games Played",
            detail: "Is the activity attractive enough to convert attention?",
          },
          {
            label: "Leads Captured",
            detail: "Are we producing usable contacts for follow-up?",
          },
          {
            label: "Meetings Booked",
            detail: "Are games generating commercial conversations?",
          },
          {
            label: "Top Workflows",
            detail: "Which topics resonate most (feeding, offline, etc)?",
          },
          {
            label: "Lead Quality",
            detail: "Are we attracting farmers, partners, or regulators?",
          },
        ];

        const remember = [
          "Support real farm workflows, not just office reporting.",
          "Make daily logs (feed, harvest, mortality) fast and consistent.",
          "Prove offline-resilient behaviour actually works in the field.",
          "Show how better records create better traceability.",
        ];
      // --- Compound Components ---
      const Booth = ({ children, className = "" }) => (
        <div className={`min-h-screen bg-slate-50 text-slate-900 selection:bg-sky-100 selection:text-slate-900 ${className}`}>
          <div className="max-w-7xl mx-auto p-6 lg:p-12 space-y-12">
            {children}
          </div>
        </div>
      );

      Booth.Hero = () => (
        <section className="relative overflow-hidden rounded-[2.5rem] bg-gradient-to-br from-slate-900 via-slate-800 to-sky-900 text-white shadow-2xl">
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.18),transparent_28%),radial-gradient(circle_at_bottom_left,rgba(255,255,255,0.12),transparent_24%)]" />
          <div className="relative grid lg:grid-cols-[1.35fr_0.75fr] gap-8 p-8 md:p-12">
            
            <div className="flex flex-col justify-center">
              <div className="flex items-center gap-2 text-xs md:text-sm uppercase tracking-[0.24em] text-white/80 font-bold">
                <Sparkles className="h-4 w-4" /> Dex × SGFarmApp × WAS
              </div>

              <div className="col-span-1 md:col-span-3 bg-gradient-to-r from-sky-700 to-blue-800 rounded-3xl p-8 text-white shadow-lg mt-8 relative overflow-hidden">
                <div className="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl" />
                <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
                  <div className="flex-1">
                    <h2 className="text-2xl font-black mb-2 tracking-tight">Real-Time Leaderboard App</h2>
                    <p className="text-emerald-50 text-sm leading-relaxed max-w-2xl font-medium">
                      A standalone React web app displayed on a TV at the booth. It polls the Gamification Service to show live rankings of the Top 10 loggers, active Bingo boards, and a scrolling activity feed—driving competitive engagement without touching the core backend.
                    </p>
                  </div>
                  <div className="flex-shrink-0">
                    <span className="inline-block bg-white text-teal-700 font-black px-6 py-3 rounded-2xl text-sm uppercase tracking-widest shadow-sm">
                      Live on Booth TV
                    </span>
                  </div>
                </div>
              </div>

              <h1 className="mt-6 text-3xl md:text-5xl font-black leading-tight max-w-4xl tracking-tight">
                Booth Strategy: Use Mini-games to Turn Curiosity Into Product Understanding.
              </h1>
              <p className="mt-6 text-base md:text-lg leading-relaxed text-white/90 max-w-3xl font-medium">
                The goal is not just to attract booth traffic. The goal is to help visitors quickly understand that SGFarmApp makes aquaculture data collection easier, more traceable, and more useful.
              </p>

              <div className="mt-10 flex flex-wrap gap-3">
                {["short games", "real farm workflows", "faster understanding", "qualified leads"].map(item => (
                  <span key={item} className="rounded-full border border-white/25 bg-white/15 px-5 py-2.5 text-sm font-bold shadow-lg backdrop-blur-sm transition-all hover:bg-white/25 cursor-default hover:scale-105">
                    {item}
                  </span>
                ))}
              </div>
            </div>

            <div className="rounded-[2.5rem] bg-white/10 backdrop-blur-xl border border-white/20 p-8 shadow-3xl self-center">
              <div className="flex items-center gap-2 mb-4">
                <span className="h-2 w-2 rounded-full bg-blue-400 animate-pulse" />
                <div className="text-xs uppercase tracking-[0.25em] font-black text-white/70">The core outcome</div>
              </div>
              <div className="text-2xl md:text-3xl font-black leading-tight tracking-tight">
                Make SGFarmApp feel easy, useful, and credible in under 5 minutes.
              </div>
              <div className="mt-8 space-y-3">
                {["Better than a static product pitch", "Better than a passive screen demo", "Designed to create follow-up conversations"].map(point => (
                  <div key={point} className="flex items-center gap-3 rounded-2xl bg-white/5 py-4 px-6 border border-white/5 hover:bg-white/10 transition-all cursor-default">
                    <div className="h-1.5 w-1.5 rounded-full bg-emerald-400" />
                    <span className="text-sm font-bold text-white/90">{point}</span>
                  </div>
                ))}
              </div>
            </div>

          </div>
        </section>
      );

      const GameContext = createContext();

      Booth.Games = ({ children }) => {
        const [selectedId, setSelectedId] = useState(null);
        const toggle = (id) => setSelectedId(prev => prev === id ? null : id);
        return (
          <GameContext.Provider value={{ selectedId, toggle }}>
            <div className="grid md:grid-cols-2 xl:grid-cols-4 gap-6">
              {children}
            </div>
          </GameContext.Provider>
        );
      };

      Booth.GameCard = ({ id, game }) => {
        const { selectedId, toggle } = useContext(GameContext);
        const isSelected = selectedId === id;

        return (
          <div 
            className="group/card perspective-[1000px] h-full cursor-pointer"
            style={{ perspective: "1000px" }}
            onClick={() => toggle(id)}
          >
            <div className={`h-full ${isSelected ? "" : "flip-hint"}`}>
              <div 
                className="relative w-full h-full grid transition-transform duration-300 ease-out active:scale-[0.98]"
                style={{
                  transformStyle: "preserve-3d",
                  transform: isSelected ? "rotateY(180deg)" : "rotateY(0deg)",
                  transitionTimingFunction: "cubic-bezier(0.175, 0.885, 0.32, 1.275)"
                }}
              >
              {/* FRONT */}
              <div 
                className="flex flex-col rounded-[2.5rem] border border-slate-200 bg-slate-50/50 p-8 transition-all group-hover/card:bg-white group-hover/card:border-sky-200 group-hover/card:shadow-2xl group-hover/card:shadow-sky-500/10"
                style={{ gridArea: "1 / 1", backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden" }}
              >
                <div className="flex items-start justify-between gap-4 mb-6 flex-wrap">
                  <div className="space-y-1">
                    <div className="text-xl font-black leading-tight tracking-tight text-slate-900 group-hover/card:text-sky-800 transition-colors">
                      {game.name}
                    </div>
                    <div className="flex items-center gap-2 text-xs text-slate-400 font-black uppercase tracking-widest">
                      <Timer className="h-3.5 w-3.5" /> {game.time}
                    </div>
                  </div>
                  <span className="shrink-0 rounded-2xl bg-slate-900 text-white px-3 py-1.5 text-[9px] font-black uppercase tracking-widest shadow-lg shadow-slate-200 mt-1">
                    {game.fit}
                  </span>
                </div>
                
                <div className="text-sm text-slate-500 font-bold leading-relaxed mb-8 flex-grow">
                  {game.goal}
                </div>

                <div className="mt-auto space-y-6">
                  <div className="rounded-3xl bg-white/80 border border-slate-200 p-5 shadow-inner">
                    <div className="text-[9px] uppercase tracking-[0.3em] text-slate-400 font-black mb-4">
                      Trainee Focus
                    </div>
                    <div className="flex flex-wrap gap-2.5">
                      {game.teaches.map(item => (
                        <span key={item} className="rounded-2xl bg-sky-50 border border-sky-100/50 px-3 py-2 text-[9px] font-black text-sky-800 uppercase tracking-tight">
                          {item}
                        </span>
                      ))}
                    </div>
                  </div>

                  <div className="space-y-4 pt-4 border-t border-slate-100">
                    <div className="text-xs text-slate-400 font-bold italic leading-relaxed">
                      <span className="block not-italic font-black text-slate-900 text-[10px] uppercase tracking-[0.2em] mb-1">Strategic Intent</span>
                      "{game.whyItWorks}"
                    </div>
                    <div className="text-xs text-slate-500 font-bold leading-relaxed">
                      <span className="block font-black text-slate-900 text-[10px] uppercase tracking-[0.2em] mb-1">Implementation Effort</span>
                      {game.effort}
                    </div>
                    <div className="flex items-center justify-between pt-2">
                      <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Lead Capture</span>
                      <span className="text-[10px] font-black text-sky-700 bg-sky-50 px-3 py-1.5 rounded-full">{game.capture}</span>
                    </div>
                  </div>

                  <div className="text-center pt-2 mt-2 border-t border-slate-100/50">
                    <span className="text-[10px] font-bold text-sky-700 uppercase tracking-widest group-hover/card:underline">
                      Flip to view gameplay steps
                    </span>
                  </div>
                </div>
              </div>

              {/* BACK */}
              <div 
                className="flex flex-col rounded-[2.5rem] border border-sky-200 bg-white p-8 shadow-2xl shadow-sky-500/10"
                style={{ gridArea: "1 / 1", backfaceVisibility: "hidden", WebkitBackfaceVisibility: "hidden", transform: "rotateY(180deg)" }}
              >
                <h4 className="text-sm font-black text-sky-700 uppercase tracking-[0.2em] mb-6 flex items-center gap-2 pb-4 border-b border-slate-100">
                  <ArrowRight className="h-4 w-4" /> Gameplay Steps
                </h4>
                <ol className="space-y-3 flex-grow">
                  {game.steps && game.steps.map((step, stepIdx) => {
                    const parsed = parseGameplayStep(step);
                    return (
                      <li key={stepIdx} className="bg-slate-50/50 p-4 rounded-2xl flex items-start gap-3 border border-slate-100">
                        <CheckCircle2 className="h-5 w-5 text-sky-600 mt-0.5 flex-shrink-0" />
                        <div className="min-w-0 flex-1">
                          {parsed.title ? (
                            <div className="mb-1.5 flex items-center gap-2">
                              <span className="inline-flex items-center rounded-full bg-sky-50 border border-sky-100/60 px-2.5 py-1 text-[10px] font-black text-sky-800 uppercase tracking-widest">
                                {parsed.title}
                              </span>
                            </div>
                          ) : null}
                          <div className="text-sm font-medium text-slate-700 leading-relaxed">
                            {parsed.text}
                          </div>
                        </div>
                      </li>
                    );
                  })}
                </ol>
                <div className="text-center pt-4 mt-6 border-t border-slate-100">
                  <span className="text-[10px] font-bold text-sky-700 uppercase tracking-widest group-hover/card:underline">
                    Flip back to overview
                  </span>
                </div>
              </div>

            </div>
            </div>
          </div>
        );
      };

      Booth.Pillars = ({ items }) => (
        <div className="group rounded-[2.5rem] bg-white border border-slate-200 shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 lg:p-10 transition-all hover:shadow-[0_8px_40px_rgb(0,0,0,0.08)] flex flex-col">
          <div className="flex items-center gap-4 mb-10">
            <div className="rounded-2xl bg-sky-700 p-3 shadow-lg shadow-sky-200">
              <Target className="h-6 w-6 text-white" />
            </div>
            <h2 className="text-2xl md:text-3xl font-black tracking-tight">Key Booth Message</h2>
          </div>
          <div className="grid sm:grid-cols-2 gap-5 flex-grow">
            {items.map((item) => {
              const Icon = item.icon;
              return (
                <div key={item.title} className="group/card rounded-3xl bg-slate-50 border border-slate-200 p-6 transition-all hover:bg-white hover:border-sky-200 hover:shadow-xl hover:shadow-sky-500/5 cursor-default flex flex-col h-full">
                  <div className="flex items-center gap-4 mb-4">
                    <div className="rounded-2xl bg-sky-100 text-sky-800 p-3 transition-colors group-hover/card:bg-sky-700 group-hover/card:text-white">
                      <Icon className="h-5 w-5" />
                    </div>
                    <div className="text-lg font-black leading-tight group-hover/card:text-slate-900 transition-colors">
                      {item.title}
                    </div>
                  </div>
                  <div className="text-sm text-slate-500 font-medium leading-relaxed group-hover/card:text-slate-600 transition-colors">
                    {item.text}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );

      Booth.Takeaways = ({ items }) => (
        <div className="rounded-[2.5rem] bg-slate-900 text-white shadow-2xl p-8 lg:p-10 relative overflow-hidden flex flex-col">
          <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500/10 blur-[100px] -mr-32 -mt-32" />
          <div className="relative z-10 flex flex-col flex-grow">
            <div className="flex items-center gap-4 mb-10">
              <div className="rounded-2xl bg-blue-500 p-3 shadow-lg shadow-blue-900/40">
                <MessageSquare className="h-6 w-6 text-slate-950" />
              </div>
              <h2 className="text-2xl md:text-3xl font-black tracking-tight">Core Takeaway</h2>
            </div>
            <div className="space-y-4 mb-10">
              {items.map((item) => (
                <div key={item} className="group/item rounded-3xl border border-white/10 bg-white/5 p-5 transition-all hover:bg-white/10 hover:border-blue-500/30 flex items-start gap-4">
                  <div className="h-6 w-6 shrink-0 mt-0.5 rounded-full border border-cyan-500/50 flex items-center justify-center text-[10px] font-black text-blue-400 opacity-60 group-hover/item:opacity-100 transition-opacity">
                    ✓
                  </div>
                  <div className="text-sm md:text-base font-bold leading-relaxed text-slate-300 group-hover/item:text-white transition-colors">
                    {item}
                  </div>
                </div>
              ))}
            </div>
            <div className="mt-auto pt-6">
              <div className="rounded-[2rem] bg-blue-400 text-slate-950 p-7 shadow-xl shadow-cyan-950/20">
                <div className="text-xs font-black uppercase tracking-[0.25em] opacity-40 mb-2">Reader-friendly recap</div>
                <div className="text-base md:text-xl font-black leading-snug">
                  The games are only the hook. Their real purpose is to make the app’s value obvious fast.
                </div>
              </div>
            </div>
          </div>
        </div>
